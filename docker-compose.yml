services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    image: analytics_platform:latest
    command: >
      sh -c "python manage.py makemigrations authentication organizations ingestion dashboards alerts --noinput &&
             python manage.py migrate authentication --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  websocket:
    image: analytics_platform:latest
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy

  celery_worker:
    image: analytics_platform:latest
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy

  celery_beat:
    image: analytics_platform:latest
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy